plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
    id "com.google.firebase.firebase-perf"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    signingConfigs {
        release {
            def keyPropertiesFile = rootProject.file('key.properties')
            if (keyPropertiesFile.exists()) {
                def keyProperties = new Properties()
                keyPropertiesFile.withReader('UTF-8') { reader ->
                    keyProperties.load(reader)
                }
                storeFile rootProject.file(keyProperties["submon.keyStorePath"])
                storePassword keyProperties["submon.keyStorePassword"]
                keyAlias keyProperties["submon.keyAlias"]
                keyPassword keyProperties["submon.keyPassword"]
            }
        }
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "net.chikach.submon"
        minSdkVersion 24
        compileSdk 36
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            manifestPlaceholders["appLinkHostName"] = "submon.app"
            manifestPlaceholders["applicationLabel"] = "Submon"
            minifyEnabled = true
            shrinkResources = true
            proguardFiles(
                    getDefaultProguardFile("proguard-android-optimize.txt"),
                    "proguard-rules.pro"
            )
            ndk {
                debugSymbolLevel = "FULL"
            }
        }
        profile {
            versionNameSuffix "-profile"
            manifestPlaceholders["appLinkHostName"] = "dev.submon.app"
            manifestPlaceholders["applicationLabel"] = "[P]Submon"
            applicationIdSuffix ".debug"
        }
        debug {
            versionNameSuffix "-debug"
            manifestPlaceholders["appLinkHostName"] = "dev.submon.app"
            manifestPlaceholders["applicationLabel"] = "[D]Submon"
            applicationIdSuffix ".debug"
        }
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }
    namespace 'net.chikach.submon'
}

flutter {
    source '../..'
}

dependencies {
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2'
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation "androidx.activity:activity-ktx:1.12.4"
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation "androidx.browser:browser:1.9.0"
    implementation 'androidx.preference:preference-ktx:1.2.1'

    implementation platform('com.google.firebase:firebase-bom:33.16.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-appcheck-playintegrity'
    implementation 'com.google.firebase:firebase-appcheck-debug'
}
