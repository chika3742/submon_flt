name: submon
description: Submission Managing App

publish_to: 'none'

# The following defines the version and build number for your application.
# The actual version name and build number will be set on CI.
version: 1.0.0+1

environment:
  sdk: ^3.10.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  audioplayers: ^6.6.0
  animations: ^2.1.1
  event_bus: ^2.0.0
  package_info_plus: ^10.0.0
  flutter_svg: ^2.2.4
  shared_preferences: ^2.5.4
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0-spm.1
  crypto: ^3.0.7
  flutter_slidable: ^4.0.0
  url_launcher: ^6.3.2
  flutter_linkify: ^6.0.0
  path_provider: ^2.1.1
  collection: ^1.16.0
  path: ^1.8.1
  device_info_plus: ^13.0.0
  share_plus: ^13.0.0
  http: ^1.6.0
  intl: ^0.20.0
  isar_community: ^3.3.0
  isar_community_flutter_libs: any
  great_list_view: ^0.2.3
  animated_reorderable_list: ^1.3.0
  go_router: ^17.2.0
  flutter_web_auth_2: ^5.0.2
  google_fonts: ^8.0.2
  logging: ^1.3.0

  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  google_mobile_ads: ^8.0.0

  firebase_core: ^4.7.0
  firebase_app_check: ^0.4.3
  firebase_crashlytics: ^5.2.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_analytics: ^12.3.0
  firebase_performance: ^0.11.3
  cloud_functions: ^6.2.0
  firebase_messaging: ^16.2.0

  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  freezed_annotation: any
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: 6.0.0
  isar_community_generator: any
  pigeon: ^26.3.2
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  go_router_builder: ^4.2.1
  mocktail: ^1.0.5

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  config:
    enable-swift-package-manager: true

  assets:
    - assets/img/
    - assets/audio/
    - assets/vector/
    - .env
    - assets/google_fonts/Murecho/
    - assets/google_fonts/Play/
    - assets/google_fonts/B612_Mono/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  fonts:
    - family: Murecho
      fonts:
        - asset: assets/google_fonts/Murecho/Murecho-Regular.ttf
        - asset: assets/google_fonts/Murecho/Murecho-Bold.ttf
          weight: 700
    - family: Play
      fonts:
        - asset: assets/google_fonts/Play/Play-Bold.ttf
    - family: B612 Mono
      fonts:
        - asset: assets/google_fonts/B612_Mono/B612Mono-Bold.ttf
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
